name: Build APK & AAB

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # 수동 실행 버튼

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. 코드 체크아웃 ──
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. JDK 17 설치 ──
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Android SDK 설치 + 라이선스 자동 동의 ──
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK components
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0"

      # ── 4. Gradle 실행 권한 ──
      - name: Grant gradlew permission
        run: chmod +x gradlew

      # ── 5. 디버그 APK 빌드 (서명 키 없이 가능) ──
      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      # ── 6. 디버그 APK 업로드 ──
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: eodigo-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── 7. 릴리즈 서명 키 복원 (Secrets 있을 때만) ──
      - name: Decode Keystore
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android.keystore

      - name: Create key.properties
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          cat > key.properties << 'EOF'
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          storeFile=../android.keystore
          storePassword=${{ secrets.STORE_PASSWORD }}
          EOF

      # ── 8. 릴리즈 AAB 빌드 (서명 키 있을 때만) ──
      - name: Build Release AAB
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: ./gradlew bundleRelease --no-daemon

      - name: Upload Release AAB
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: eodigo-release-aab
          path: app/build/outputs/bundle/release/app-release.aab
          retention-days: 90
